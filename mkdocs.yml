      - 第 02 章 深度学习基础: ai/第02章_深度学习基础.md
      - 第 03 章 NLP 基础与 Tokenization: ai/第03章_NLP基础与Tokenization.md
    - 原理篇:
      - 第 04 章 Transformer 架构详解: ai/第04章_Transformer架构详解.md
      - 第 05 章 大模型原理与发展脉络: ai/第05章_大模型原理与发展脉络.md
    - 应用篇:
      - 第 06 章 大模型 API 调用实战: ai/第06章_大模型API调用实战.md
      - 第 07 章 Prompt Engineering: ai/第07章_PromptEngineering提示词工程.md
      - 第 08 章 Embedding 与向量数据库: ai/第08章_Embedding与向量数据库.md
      - 第 09 章 RAG 检索增强生成: ai/第09章_RAG检索增强生成.md
    - 框架篇:
