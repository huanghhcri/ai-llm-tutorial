      - 第 14 章 模型量化: ai/第14章_模型量化.md
      - 第 15 章 私有化部署: ai/第15章_私有化部署.md
      - 第 16 章 多模态大模型: ai/第16章_多模态大模型.md
      - 第 17 章 模型评估与对齐: ai/第17章_模型评估与对齐.md
