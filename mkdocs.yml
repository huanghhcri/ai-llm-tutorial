# 技术成长笔记
# 系统化技术学习路径：AI 大模型 + .NET 企业开发
# https://github.com/huanghhcri/ai-llm-tutorial

site_name: 技术成长笔记
site_description: 系统化技术学习路径 — AI 大模型篇 · .NET 企业开发篇
site_author: huanghhcri
site_url: https://huanghhcri.github.io/ai-llm-tutorial/

repo_name: huanghhcri/ai-llm-tutorial
repo_url: https://github.com/huanghhcri/ai-llm-tutorial

theme:
  name: material
  custom_dir: overrides
  language: zh
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: 切换到暗色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式
  font:
    text: Noto Sans SC
    code: JetBrains Mono
  features:
    - navigation.tabs              # 顶部标签页（首页/AI篇/.NET篇）
    - navigation.tabs.link         # 标签页可点击跳转
    - navigation.sections          # 侧边栏分组
    - navigation.expand            # 自动展开所有导航项
    - navigation.top               # 返回顶部按钮
    - navigation.indexes           # 分组索引页
    - navigation.footer            # 上一章/下一章 底部导航
    - navigation.instant           # 即时加载（SPA 体验）
    - navigation.tracking          # URL 跟踪
    - search.suggest               # 搜索建议
    - search.highlight             # 搜索高亮
    - search.share                 # 搜索分享
    - content.code.copy            # 代码复制按钮
    - content.code.annotate        # 代码注释
    - content.tabs.link            # 标签页同步
    - toc.follow                   # 目录跟随滚动
    - header.autohide              # 滚动时隐藏标题栏
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

plugins:
  - search:
      lang: zh
  - tags

extra_css:
  - assets/stylesheets/extra.css

extra_javascript:
  - assets/javascripts/sidebar-toggle.js
  - assets/javascripts/anchor-expand.js
  - assets/javascripts/annotation-hint.js?v=5
  - https://hypothes.is/embed.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/huanghhcri/ai-llm-tutorial
  generator: false

nav:
  - 首页: index.md
  - AI 大模型篇:
